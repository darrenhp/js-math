<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Math Libs · JavaScript 数学库能力演示</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">Σ</div>
        <div class="brand-text">
          <h1>JS Math Libs</h1>
          <p>JavaScript 数学库能力演示</p>
        </div>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索库名称 / 场景…" autocomplete="off" />
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-footer">
        <span id="libCount"></span>
        <button id="themeToggle" class="theme-btn" title="切换主题">🌙</button>
      </div>
    </aside>

    <!-- Mobile top bar -->
    <header class="topbar">
      <button id="menuBtn" class="menu-btn" aria-label="菜单">☰</button>
      <span class="topbar-title">JS Math Libs</span>
    </header>

    <!-- Main content -->
    <main class="content" id="content">
      <div class="content-inner" id="contentInner"></div>
    </main>
  </div>

  <div class="scrim" id="scrim"></div>

  <!-- Math libraries via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/mathjs@12.4.1/lib/browser/math.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/decimal.js@10.4.3/decimal.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/big.js@6.2.1/big.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bignumber.js@9.1.2/bignumber.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/numeric@1.2.6/numeric-1.2.6.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ml-matrix@6.11.0/matrix.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gl-matrix@3.4.3/gl-matrix-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/numjs@0.16.1/dist/numjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-statistics@7.8.3/dist/simple-statistics.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-array@3.2.4/dist/d3-array.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-random@3.0.1/dist/d3-random.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jstat@1.9.6/dist/jstat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/paper@0.12.17/dist/paper-full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/random-js@2.1.0/dist/random-js.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/algebrite@1.4.0/dist/algebrite.bundle-for-browser.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://www.lactame.com/lib/ml/6.0.0/ml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fraction.js@4.3.7/fraction.min.js"></script>

  <!-- App -->
  <script src="./js/data.js"></script>
  <script src="./js/demos.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
