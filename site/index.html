<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Math Libs · JavaScript 数学库能力演示</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">Σ</div>
        <div class="brand-text">
          <h1>JS Math Libs</h1>
          <p>JavaScript 数学库能力演示</p>
        </div>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索库名称 / 场景…" autocomplete="off" />
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-footer">
        <span id="libCount"></span>
        <button id="themeToggle" class="theme-btn" title="切换主题">🌙</button>
      </div>
    </aside>

    <!-- Mobile top bar -->
    <header class="topbar">
      <button id="menuBtn" class="menu-btn" aria-label="菜单">☰</button>
      <span class="topbar-title">JS Math Libs</span>
    </header>

    <!-- Main content -->
    <main class="content" id="content">
      <div class="content-inner" id="contentInner"></div>
    </main>
  </div>

  <div class="scrim" id="scrim"></div>

  <!-- Math libraries via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/mathjs@12.4.1/lib/browser/math.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/decimal.js@10.4.3/decimal.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/big.js@6.2.1/big.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bignumber.js@9.1.2/bignumber.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/numeric@1.2.6/numeric-1.2.6.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ml-matrix@6.11.0/matrix.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gl-matrix@3.4.3/gl-matrix-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/numjs@0.16.1/dist/numjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-statistics@7.8.3/dist/simple-statistics.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jstat@1.9.6/dist/jstat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/paper@0.12.17/dist/paper-full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/seedrandom@3.0.5/seedrandom.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/random-js@2.1.0/dist/random-js.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/algebrite@1.4.0/dist/algebrite.bundle-for-browser.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://www.lactame.com/lib/ml/6.0.0/ml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fraction.js@4.3.7/fraction.min.js"></script>
  <!-- 生成函数 / 多项式（Polynomial.js 依赖 Fraction/Complex/Quaternion 全局，需在其之前加载）-->
  <script src="https://cdn.jsdelivr.net/npm/complex.js@2.1.1/complex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quaternion@1.5.1/quaternion.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/polynomial@1.6.1/dist/polynomial.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/polynomium@0.1.9/lib/polynomium.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jisg@0.999.0/dist/index.umd.js"></script>

  <!-- 新增 UMD 库（通用/符号/几何/图论/单位/组合等）-->
  <script src="https://cdn.jsdelivr.net/npm/chance@1.1.13/chance.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/earcut@3.2.3/dist/earcut.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/polybooljs@1.2.2/dist/polybool.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.34.0/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/graphlib@2.1.8/dist/graphlib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/big-integer@1.6.52/BigInteger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/expr-eval@2.0.2/dist/bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-combinatorics@2.1.2/umd/combinatorics.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/graphology@0.26.0/dist/graphology.umd.min.js"></script>

  <!-- MathJax：数学公式渲染（异步，需先配置）-->
  <script>
    window.MathJax = { svg: { fontCache: 'global' }, startup: { ready: function () { MathJax.startup.defaultReady(); } } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@4/es5/tex-svg.js" id="MathJax-script" async></script>

  <!-- App -->
  <script src="./js/data.js"></script>
  <script src="./js/demos.js"></script>
  <script src="./js/demos-extra.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
